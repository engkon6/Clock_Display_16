name: Compile ESP8266 Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Configure arduino-cli
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core update-index
          arduino-cli core install esp8266:esp8266

      - name: Install Libraries
        run: |
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "ElegantOTA"
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "PubSubClient"
          mkdir -p $HOME/Arduino/libraries
          git clone https://github.com/markruys/arduino-Max72xxPanel $HOME/Arduino/libraries/Max72xxPanel

      - name: Compile Sketch
        run: |
          arduino-cli compile --fqbn esp8266:esp8266:nodemcuv2 --output-dir ./build .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp8266-firmware
          path: ./build/*.bin
