name: Build Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.board }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - board: esp8266
            fqbn: esp8266:esp8266:nodemcuv2
            platform_url: https://arduino.esp8266.com/stable/package_esp8266com_index.json
            core: esp8266:esp8266
          - board: esp32c3
            fqbn: esp32:esp32:esp32c3:CDCOnBoot=cdc,FlashMode=dio
            platform_url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
            core: esp32:esp32

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Configure arduino-cli
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls ${{ matrix.platform_url }}
          arduino-cli core update-index
          arduino-cli core install ${{ matrix.core }}

      - name: Install Libraries
        run: |
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "ElegantOTA"
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "PubSubClient"
          mkdir -p $HOME/Arduino/libraries
          git clone https://github.com/markruys/arduino-Max72xxPanel $HOME/Arduino/libraries/Max72xxPanel

      - name: Compile Sketch
        run: |
          arduino-cli compile --fqbn ${{ matrix.fqbn }} --output-dir ./build .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.board }}-firmware
          path: ./build/*.bin
